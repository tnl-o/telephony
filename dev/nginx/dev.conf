upstream dev_frontend {
    server frontend:80;
}

upstream dev_backend {
    server backend:3000;
}

# FreeSWITCH WSS (TLS inside Docker — nginx skips cert verify)
upstream dev_freeswitch_wss {
    server freeswitch:7443;
}

server {
    listen 443 ssl http2;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    # Frontend (React)
    location / {
        proxy_pass http://dev_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $http_host;
    }

    # Backend REST API
    location /api {
        proxy_pass http://dev_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $http_host;
    }

    # Backend WebSocket (online status)
    location /ws {
        proxy_pass http://dev_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "Upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $http_host;
        proxy_read_timeout 86400;
    }

    # FreeSWITCH SIP WebSocket (browser→nginx WSS → nginx→ FreeSWITCH WSS :7443)
    # Via header stays SIP/2.0/WSS so FreeSWITCH accepts it correctly.
    location /sip {
        proxy_pass https://dev_freeswitch_wss;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "Upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_ssl_verify                   off;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}
